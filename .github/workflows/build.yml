name: Build RecafMCP Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout RecafMCP
        uses: actions/checkout@v4

      - name: Setup JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: gradle

      - name: Build RecafMCP
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test --no-daemon

      - name: Checkout Recaf repository
        uses: actions/checkout@v4
        with:
          repository: Col-E/Recaf
          path: Recaf
          fetch-depth: 0

      - name: Checkout Recaf snapshot d07958a5c7
        working-directory: Recaf
        run: |
          git checkout d07958a5c7
          git rev-parse HEAD

      - name: Build Recaf snapshot jar only
        working-directory: Recaf
        run: |
          chmod +x ./gradlew
          ./gradlew assemble -x test -x compileTestJava -Dskip_jfx_bundle=true --no-daemon

      - name: Collect bundle
        run: |
          mkdir -p dist/plugins dist/mcp dist/recaf

          cp build/libs/recaf-mcp-plugin-*.jar dist/plugins/
          cp build/mcp/recaf-mcp-server-*.jar dist/mcp/
          cp Recaf/recaf-ui/build/libs/recaf-ui-*-all.jar dist/recaf/

          cat > dist/run-recaf.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "$0")" && pwd)"
          java -jar "$DIR"/recaf/recaf-ui-*-all.jar -r "$DIR/plugins"
          EOF

          chmod +x dist/run-recaf.sh

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: recaf-mcp-bundle-macos
          path: dist/