name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    name: Build JARs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: gradle

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: recaf-mcp-jars
          if-no-files-found: error
          path: |
            build/libs/recaf-mcp-plugin-*.jar
            build/mcp/recaf-mcp-server-*.jar